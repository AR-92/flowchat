<!doctype html>
<html lang="en">

<head>
  <!-- Essential Metadata -->
  <meta http-equiv="Content-Language" content="en">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowChat - AI Customer Support Chatbot</title>
  <meta name="description"
    content="FlowChat is an advanced AI chatbot designed to provide seamless customer support for businesses of all sizes. Elevate your customer experience today!">
  <meta name="keywords" content="AI chatbot, customer support chatbot, automated customer service, FlowChat">
  <meta name="robots" content="index, follow">
  <meta name="author" content="FlowChat Team">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://www.flowchat.info/">

  <!-- Open Graph Metadata (For Social Sharing) -->
  <meta property="og:title" content="FlowChat - AI Customer Support Chatbot">
  <meta property="og:description"
    content="Discover FlowChat, the AI-powered chatbot revolutionizing customer support. Enhance efficiency and customer satisfaction!">
  <meta property="og:image" content="https://www.flowchat.info/images/og-image.png">
  <meta property="og:url" content="https://www.flowchat.info/">
  <meta property="og:type" content="website">

  <!-- Twitter Metadata -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FlowChat - AI Customer Support Chatbot">
  <meta name="twitter:description" content="Revolutionize customer support with FlowChat, your AI chatbot solution.">
  <meta name="twitter:image" content="https://www.flowchat.info/images/twitter-card.png">

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FlowChat",
      "url": "https://www.flowchat.info/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.flowchat.info/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="./assets/imgs/favicon.ico">
  <link rel="apple-touch-icon" href="./assets/images/apple-touch-icon.png">

  <!-- Performance Optimization -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
  <link rel="preload" href="./assets/css/tailwindcss.css" as="style">
  <link rel="preload" href="./assets/js/htmx.js" as="script">
  <link rel="preload" href="./assets/js/hyperscript.js" as="script">

  <!-- External CSS -->
  <link href="./assets/css/tailwindcss.css" rel="stylesheet">
  <link href="./assets/css/animate.css" rel="stylesheet">
  <link href="./assets/css/scroll.css" rel="stylesheet">

  <!-- Styling -->
  <style>
    .htmx-indicator {
      opacity: 0;
    }

    .htmx-request .htmx-indicator {
      opacity: 1;
      transition: opacity 200ms ease-in;
    }
  </style>

  <!-- External JavaScript -->
  <script defer src="./assets/js/script.obfuscated.js"></script>
  <script defer src="./assets/js/htmx.js"></script>
  <script defer src="./assets/js/hyperscript.js"></script>
